<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Blocked - Dynamic Site Blocker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; background: #111;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .container { text-align: center; max-width: 500px; padding: 40px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    .title { color: #e74c3c; font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: 2px; }
    .domain { color: #555; font-size: 14px; margin-bottom: 28px; word-break: break-all; }
    .message { color: #ccc; font-size: 18px; font-weight: 600; margin-bottom: 36px; line-height: 1.5; font-style: italic; }
    .attempts { color: #333; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🛡️</div>
    <div class="title">BLOCKED</div>
    <div class="domain" id="domain"></div>
    <div class="message" id="message"></div>
    <div class="attempts" id="attempts"></div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
